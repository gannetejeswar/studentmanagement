apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: student-app

  template:
    metadata:
      labels:
        app: student-app

    spec:
      containers:
      - name: student-app

        image: gannetejeswarnaidu/student-management-springboot:latest

        ports:
        - containerPort: 8080

        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:mysql://mysql:3306/studentdb?createDatabaseIfNotExist=true

        - name: SPRING_DATASOURCE_USERNAME
          value: root

        - name: SPRING_DATASOURCE_PASSWORD
          value: root